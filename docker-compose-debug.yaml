# Конфигурация, удобная для разработки в PyCharm: бот запускается без docker, порты postgres и redis открыты на localhost
# Не используйте её в production!
version: '3'
services:
  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5400:5432'
    volumes:
      - ./var/pg:/var/lib/postgresql/data
  redis:
    image: 'valkey/valkey:9.0.1'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - ./var/valkey:/data
    ports:
      - '6370:6379'
